services:
  - type: web
    name: unilag-campus-map-backend
    env: python
    region: oregon
    plan: free
    runtime: python-3.11
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-frontend.vercel.app
        # Update with your Vercel frontend URL after deployment
    routes:
      - path: /api
        destination: http://localhost:8000/api
